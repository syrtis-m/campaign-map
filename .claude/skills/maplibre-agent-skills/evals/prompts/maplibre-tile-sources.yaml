# Evals for the maplibre-tile-sources skill.
#
# Skill content is injected as the system prompt via lib/skill-prompt.mjs.
#
# Tests selected by baseline methodology: each question was run without the
# skill and confirmed to fail before being added here.
#
# NOTE: Test 1 (GeoJSON vs tiles tradeoff reasoning) requires Gemini as judge
# for meaningful baseline validation — Cerebras passes responses that do not
# demonstrate the required reasoning quality. Use --grader google:gemini-2.5-flash-lite
# with --delay 2000 for baseline checks.
#
# See evals/README.md for run commands and provider setup.

description: Evals for the maplibre-tile-sources skill

prompts:
  - file://lib/skill-prompt.mjs

providers:
  - id: cerebras:gpt-oss-120b
    label: cerebras-gpt-oss

evaluateOptions:
  delay: 500

defaultTest:
  vars:
    skillFile: skills/maplibre-tile-sources/SKILL.md
  options:
    provider: cerebras:gpt-oss-120b

tests:
  - description: explicit — GeoJSON vs tiles decision for a real scenario
    vars:
      prompt: >
        I have about 8,000 hiking trail segments stored as GeoJSON, and
        users need to click a trail to see its name and distance. I also
        need a basemap showing terrain and roads. How should I set up the
        data sources in MapLibre — do I need vector tiles, or can I use
        GeoJSON?
    assert:
      - type: llm-rubric
        value: >
          Must treat 8,000 features as a gray zone — not a clean
          "use GeoJSON" or "use vector tiles" answer — and explain
          the tradeoffs rather than jumping straight to a recommendation.
          Must explain at least two of the following tradeoffs: GeoJSON
          downloads the entire dataset on load (parse time grows with
          feature count); GeoJSON gives full client-side attribute access
          without a server round-trip, which benefits click/hover
          interactions; vector tiles load only the visible viewport but
          require generating and hosting tile infrastructure. Must explain
          why GeoJSON is still a defensible choice for this scenario:
          the dataset is interactive (click to see properties), which
          favors GeoJSON's full attribute access, and the dataset size is
          in the range where optimization (simplify geometries, reduce
          coordinate precision) can keep load time acceptable. Must
          describe the combination pattern: use a hosted basemap style URL
          for terrain and roads, and add the trail data as a separate
          GeoJSON source. Must not recommend building a custom tile server
          or vector tile pipeline as the primary solution without
          acknowledging that GeoJSON is a viable alternative here.

  - description: implicit — custom style layers invisible against hosted tiles
    vars:
      prompt: >
        I'm using a hosted tile provider's style URL and everything looks
        great. But when I try to write my own custom style against the same
        tile source, none of my layers show up.
    assert:
      - type: icontains
        value: source-layer
      - type: llm-rubric
        value: >
          Explains that the custom style's layer definitions must reference
          `source-layer` names exactly as they appear in the tile source's
          schema. Directs the developer to the TileJSON `vector_layers` field
          as the authoritative list of available source-layer names. Explains
          that the provider's pre-built style already has these matched and
          that building a custom style requires knowing the schema.

  - description: anti-pattern — addLayer covering basemap labels
    vars:
      prompt: >
        I added my GeoJSON data layer with map.addLayer() and it shows up,
        but it's drawn on top of all the street names and labels.
        How do I fix the layer order?
    assert:
      - type: icontains
        value: symbol
      - type: llm-rubric
        value: >
          Explains that `map.addLayer()` without a second argument appends
          the layer above everything including labels. Shows the correct fix:
          find the first layer with type `symbol` in the style, and pass
          its ID as the second argument to `map.addLayer()` to insert the
          data layer below labels. Must not only give hardcoded label layer
          IDs from a specific provider's style (e.g. 'road-label') as the
          primary answer — the programmatic approach works across any style.

  - description: implicit — no text labels in custom style
    vars:
      prompt: >
        I set up a custom MapLibre style that points to my self-hosted tile
        server. The map loads and the tiles are rendering correctly, but
        there are no text labels anywhere on the map. What am I missing?
    assert:
      - type: llm-rubric
        value: >
          Must explain that text labels in MapLibre require a `glyphs`
          property at the root of the style, pointing to a font SDF endpoint
          in the format `{fontstack}/{range}.pbf`. Must not focus primarily
          on CORS or tile loading issues as the cause, since the user has
          confirmed tiles are rendering correctly. May also mention `sprite`
          as required for icons and symbols.

  - description: negative — small dataset, no tile server needed
    vars:
      prompt: >
        I'm building a store locator for about 50 locations across the US.
        Do I need to set up a vector tile server for this?
    assert:
      - type: llm-rubric
        value: >
          Must say that 50 locations is well within the GeoJSON sweet spot
          (under 5,000 features) and does NOT require a tile server or
          vector tile infrastructure. Must not recommend setting up a tile
          server, PMTiles pipeline, or tile generation workflow for a
          dataset this small. May suggest GeoJSON source or markers.
