# Evals for the maplibre-mapbox-migration skill.
# See evals/README.md for run commands and provider setup.

description: Evals for the maplibre-mapbox-migration skill

prompts:
  - file://lib/skill-prompt.mjs

providers:
  - id: cerebras:gpt-oss-120b
    label: cerebras-gpt-oss

evaluateOptions:
  delay: 500

defaultTest:
  vars:
    skillFile: skills/maplibre-mapbox-migration/SKILL.md
  options:
    provider: cerebras:gpt-oss-120b

tests:
  - description: explicit — validate style JSON with CLI tool after migration
    vars:
      prompt: >
        I'm migrating from Mapbox to MapLibre and want to check whether my
        exported style JSON is compatible before deploying. Is there a CLI
        tool I can run on the file?
    assert:
      - type: icontains
        value: gl-style-validate
      - type: llm-rubric
        value: >
          Must mention the @maplibre/maplibre-style-spec package and the
          gl-style-validate command for validating a style JSON file. Must
          not suggest only browser devtools or generic JSON validators as
          the primary answer.

  - description: implicit — tile source with no API key needed during migration
    vars:
      prompt: >
        I'm migrating from Mapbox to MapLibre and removed my access token,
        but now my mapbox:// style won't load. How can I test my map against
        a tile service that doesn't require an API key?
    assert:
      - type: icontains
        value: openfreemap
      - type: llm-rubric
        value: >
          Recommends OpenFreeMap as a tile source that requires no API key.
          Provides or references the OpenFreeMap style URL. Does NOT
          recommend a tile service that requires a paid account or API key
          as the primary answer.

  - description: anti-pattern — assuming Mapbox v2 features work in MapLibre
    vars:
      prompt: >
        I was using Mapbox GL JS v2 in my app, including map.setFog() and
        some v2-specific camera features. After migrating to MapLibre, these
        are broken. Did I do something wrong in the migration?
    assert:
      - type: icontains
        value: v1.13
      - type: llm-rubric
        value: >
          Must explain that MapLibre forked from Mapbox GL JS v1.13 in
          December 2020, so Mapbox v2+ proprietary features are not
          guaranteed to work unchanged. Must not claim MapLibre is fully
          compatible with Mapbox GL JS v2. May note that MapLibre has added
          its own features (terrain, globe, etc.) since the fork that differ
          from Mapbox's v2 additions.

  - description: implicit — finding compatible plugins after migration
    vars:
      prompt: >
        I use several Mapbox GL JS plugins in my app and I'm migrating
        to MapLibre. How do I know which ones will still work?
    assert:
      - type: icontains
        value: awesome-maplibre
      - type: llm-rubric
        value: >
          References awesome-maplibre as the resource for finding
          MapLibre-compatible plugins and alternatives. Explains that
          many Mapbox plugins work unchanged, some have been forked or
          replaced with MapLibre-native versions, and awesome-maplibre
          is the canonical list of compatible options.

  - description: negative — adding a geocoder to an existing Mapbox GL JS app
    vars:
      prompt: >
        I use Mapbox GL JS v2 and want to add a geocoder search box
        to my map. What are my options?
    assert:
      - type: llm-rubric
        value: >
          Answers the geocoding options question for Mapbox GL JS v2.
          Does NOT recommend migrating to MapLibre or bring up library
          migration as if it were relevant to this question.
